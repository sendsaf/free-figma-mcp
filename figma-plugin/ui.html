<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Free Figma MCP Bridge</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101116;
        color: #f3f4f8;
        min-height: 100vh;
        overflow: hidden;
      }
      .panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 12px;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .title {
        display: flex;
        align-items: center;
        min-width: 0;
      }
      h1 {
        font-size: 12px;
        line-height: 1.2;
        font-weight: 650;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .subtle {
        color: #8d93a5;
        font-size: 10px;
        line-height: 1.2;
      }
      .actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }
      button {
        border: 1px solid #2b2f3a;
        background: #181b23;
        color: #e7e9f1;
        border-radius: 6px;
        height: 26px;
        min-width: 26px;
        padding: 0 8px;
        font-size: 11px;
        cursor: pointer;
      }
      button:hover { background: #202532; }
      button:active { background: #283044; }
      button.primary {
        width: 100%;
        height: 34px;
        border-color: #3457c9;
        background: #315dff;
        color: #ffffff;
        font-size: 12px;
        font-weight: 650;
      }
      button.primary:hover { background: #416cff; }
      button.primary:disabled {
        opacity: 1;
        background: #143623;
        border-color: #25593d;
        color: #c5f7db;
      }
      button.danger {
        width: 100%;
        height: 34px;
        border-color: #783139;
        background: #3a171d;
        color: #ffd8dc;
        font-size: 12px;
        font-weight: 650;
      }
      button.danger:hover { background: #3a1b20; }
      button:disabled {
        opacity: .45;
        cursor: default;
      }
      .status-card {
        border: 1px solid #242834;
        background: #151820;
        border-radius: 8px;
        padding: 10px;
        display: grid;
        gap: 8px;
      }
      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .state {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #6b7280;
        flex-shrink: 0;
      }
      .dot.connected { background: #35d07f; box-shadow: 0 0 8px rgba(53, 208, 127, 0.45); }
      .dot.error { background: #ff5f57; }
      .dot.connecting { background: #f2b84b; animation: pulse 1s infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
      #status {
        font-size: 12px;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      .metrics {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .metric {
        border: 1px solid #242834;
        background: #11141b;
        border-radius: 7px;
        padding: 8px;
      }
      .metric strong {
        display: block;
        font-size: 13px;
        line-height: 1.2;
      }
      .toolbar {
        display: flex;
        gap: 6px;
      }
      .toolbar button {
        flex: 1;
      }
      .github-pill {
        display: flex;
        align-items: center;
        gap: 6px;
        justify-content: center;
        height: 26px;
        padding: 0 10px;
        border: 1px solid #303646;
        border-radius: 999px;
        background: #171b24;
        color: #d9deea;
        font-size: 11px;
        font-weight: 650;
        text-decoration: none;
        white-space: nowrap;
      }
      .github-pill:hover {
        background: #222837;
        border-color: #4a5570;
      }
      .github-pill svg {
        width: 15px;
        height: 15px;
        fill: currentColor;
      }
      .bridge-controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        flex-shrink: 0;
      }
      #log {
        background: #0b0d12;
        border: 1px solid #242834;
        border-radius: 8px;
        padding: 8px;
        height: 96px;
        flex-shrink: 0;
        overflow-y: auto;
        font: 11px/1.45 ui-monospace, SFMono-Regular, Consolas, monospace;
        color: #9aa3b7;
      }
      .collapsed .panel {
        padding: 8px 10px;
      }
      .collapsed .status-card,
      .collapsed .toolbar,
      .collapsed #log,
      .collapsed .bridge-controls {
        display: none;
      }
      .collapsed .subtle {
        display: none;
      }
      .mini-status {
        display: none;
        align-items: center;
        gap: 5px;
        font-size: 10px;
        color: #8d93a5;
        white-space: nowrap;
      }
      .mini-status .dot {
        width: 7px;
        height: 7px;
      }
      .collapsed .mini-status {
        display: flex;
      }
      .collapsed h1 {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="topbar">
        <div class="title">
          <div>
            <h1>Free Figma MCP</h1>
            <div class="subtle">Bridge for IDE agents</div>
          </div>
          <div class="mini-status">
            <div class="dot connecting" id="miniDot"></div>
            <span id="miniStatus">Connecting</span>
          </div>
        </div>
        <div class="actions">
          <a class="github-pill" href="https://github.com/sendsaf/free-figma-mcp" target="_blank" rel="noreferrer" title="Star Free Figma MCP on GitHub by SendSaf" aria-label="Star Free Figma MCP on GitHub by SendSaf">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M8 .2a8 8 0 0 0-2.5 15.6c.4.1.5-.2.5-.4v-1.4c-2 .4-2.5-.9-2.5-.9-.3-.8-.8-1-.8-1-.7-.5.1-.5.1-.5.8.1 1.2.8 1.2.8.7 1.2 1.8.8 2.2.6.1-.5.3-.8.5-1-1.7-.2-3.4-.8-3.4-3.8 0-.8.3-1.5.8-2-.1-.2-.3-1 .1-2 0 0 .7-.2 2.1.8a7 7 0 0 1 3.8 0c1.4-1 2.1-.8 2.1-.8.4 1 .2 1.8.1 2 .5.6.8 1.2.8 2 0 3-1.8 3.6-3.4 3.8.3.2.5.7.5 1.4v2.1c0 .2.1.5.5.4A8 8 0 0 0 8 .2Z"></path>
            </svg>
            <span>Star</span>
          </a>
          <button id="collapse" type="button" title="Collapse plugin window">Minimize</button>
        </div>
      </div>

      <div class="status-card">
        <div class="status-row">
          <div class="state">
            <div class="dot connecting" id="dot"></div>
            <span id="status">Connecting to ws://localhost:3055</span>
          </div>
          <div class="subtle" id="lastSeen">Never</div>
        </div>
        <div class="metrics">
          <div class="metric">
            <span class="subtle">Commands</span>
            <strong id="commandCount">0</strong>
          </div>
          <div class="metric">
            <span class="subtle">Last command</span>
            <strong id="lastCommand">None</strong>
          </div>
        </div>
      </div>

      <div class="toolbar">
        <button id="focusSelection" type="button">Focus selection</button>
        <button id="clearLog" type="button">Clear log</button>
      </div>

      <div id="log"></div>
      <div class="bridge-controls">
        <button id="bridgeToggle" class="primary" type="button" title="Start the WebSocket bridge">Start</button>
        <button id="stop" class="danger" type="button" title="Stop the active MCP request or disconnect the bridge" disabled>Stop</button>
      </div>
    </div>

    <script>
      var statusEl = document.getElementById("status");
      var dotEl = document.getElementById("dot");
      var miniDotEl = document.getElementById("miniDot");
      var miniStatusEl = document.getElementById("miniStatus");
      var logEl = document.getElementById("log");
      var countEl = document.getElementById("commandCount");
      var lastCommandEl = document.getElementById("lastCommand");
      var lastSeenEl = document.getElementById("lastSeen");
      var bridgeToggleButton = document.getElementById("bridgeToggle");
      var stopButton = document.getElementById("stop");
      var collapseButton = document.getElementById("collapse");
      var focusButton = document.getElementById("focusSelection");
      var clearButton = document.getElementById("clearLog");

      var socket = null;
      var collapsed = false;
      var commandCount = 0;
      var activeRequestId = null;
      var activeCommandType = null;
      var currentWidth = 340;
      var currentHeight = 270;
      var manualClose = false;

      function postToPlugin(message) {
        parent.postMessage({ pluginMessage: message }, "*");
      }

      function log(message) {
        var line = document.createElement("div");
        line.textContent = "[" + new Date().toLocaleTimeString() + "] " + message;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function setStatus(state, text) {
        dotEl.className = "dot " + state;
        statusEl.textContent = text;
        lastSeenEl.textContent = new Date().toLocaleTimeString();
        miniDotEl.className = "dot " + state;
        miniStatusEl.textContent = state === "connected" ? "Connected" : state === "connecting" ? "Connecting" : "Disconnected";
      }

      function setActiveRequest(requestId, commandType) {
        activeRequestId = requestId || null;
        activeCommandType = commandType || null;
        stopButton.disabled = !(activeRequestId || socket);
      }

      function resizePlugin(width, height) {
        currentWidth = Math.max(260, Math.min(900, Math.round(width)));
        currentHeight = Math.max(54, Math.min(760, Math.round(height)));
        postToPlugin({
          type: "resize_ui",
          width: currentWidth,
          height: currentHeight
        });
      }

      function closeSocket() {
        if (socket) {
          manualClose = true;
          socket.onclose = null;
          socket.close();
          socket = null;
        }
      }

      function connect() {
        closeSocket();
        manualClose = false;
        bridgeToggleButton.textContent = "Connecting";
        bridgeToggleButton.disabled = true;
        setStatus("connecting", "Connecting to ws://localhost:3055");
        socket = new WebSocket("ws://localhost:3055");

        socket.onopen = function() {
          setStatus("connected", "Connected to MCP bridge");
          bridgeToggleButton.textContent = "Running";
          bridgeToggleButton.disabled = true;
          stopButton.disabled = false;
          socket.send(JSON.stringify({
            type: "hello",
            role: "figma",
            client: "local-figma-plugin"
          }));
          postToPlugin({ type: "bridge-connected" });
          log("Connected");
        };

        socket.onmessage = function(event) {
          var command;
          try {
            command = JSON.parse(event.data);
          } catch (error) {
            return;
          }

          commandCount += 1;
          countEl.textContent = String(commandCount);
          lastCommandEl.textContent = command.type || "unknown";
          setActiveRequest(command.requestId, command.type);
          log("<- " + (command.type || "unknown"));
          postToPlugin(command);
        };

        socket.onerror = function() {
          setStatus("error", "WebSocket error");
          log("Connection error");
          bridgeToggleButton.textContent = "Start";
          bridgeToggleButton.disabled = false;
          stopButton.disabled = true;
        };

        socket.onclose = function() {
          socket = null;
          bridgeToggleButton.textContent = "Start";
          bridgeToggleButton.disabled = false;
          setActiveRequest(null, null);
          if (manualClose) {
            setStatus("error", "Bridge disconnected");
            log("Disconnected by user");
            return;
          }
          setStatus("error", "Disconnected; press Start");
          log("Disconnected");
        };
      }

      window.onmessage = function(event) {
        var msg = event.data.pluginMessage;
        if (!msg) return;
        if (socket && socket.readyState === WebSocket.OPEN) {
          log("-> " + (msg.type || "result"));
          socket.send(JSON.stringify(msg));
          if (msg.requestId && msg.requestId === activeRequestId) {
            setActiveRequest(null, null);
          }
        }
      };

      bridgeToggleButton.onclick = function() {
        if (socket && socket.readyState === WebSocket.OPEN) {
          return;
        }
        log("Start requested");
        connect();
      };

      function clearLog() {
        while (logEl.firstChild) {
          logEl.removeChild(logEl.firstChild);
        }
        commandCount = 0;
        countEl.textContent = "0";
        lastCommandEl.textContent = "None";
      }

      clearButton.onclick = function(event) {
        if (event && event.preventDefault) event.preventDefault();
        if (event && event.stopPropagation) event.stopPropagation();
        clearLog();
      };

      stopButton.onclick = function() {
        var stoppedId = activeRequestId;
        log(stoppedId ? "Stop requested for " + (activeCommandType || "active command") : "Disconnect requested");
        if (stoppedId) {
          postToPlugin({ type: "stop_current", requestId: stoppedId });
        }
        if (socket && socket.readyState === WebSocket.OPEN) {
          if (stoppedId) {
            socket.send(JSON.stringify({
              type: "result",
              requestId: stoppedId,
              ok: false,
              stopped: true,
              error: "Stopped by user from the Free Figma MCP Bridge UI."
            }));
          }
        }
        closeSocket();
        setActiveRequest(null, null);
        bridgeToggleButton.textContent = "Start";
        bridgeToggleButton.disabled = false;
        setStatus("error", "Bridge disconnected");
      };

      focusButton.onclick = function() {
        postToPlugin({ type: "focus_selection" });
      };

      collapseButton.onclick = function() {
        collapsed = !collapsed;
        document.body.className = collapsed ? "collapsed" : "";
        collapseButton.textContent = collapsed ? "Open" : "Minimize";
        collapseButton.title = collapsed ? "Expand plugin window" : "Collapse plugin window";
        resizePlugin(collapsed ? 300 : 340, collapsed ? 54 : 380);
      };

      setStatus("error", "Press Start to connect");
    </script>
  </body>
</html>
